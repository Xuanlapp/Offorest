name: Build Electron App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & Package (Mac)
        run: npm run build && npx electron-builder --mac dmg zip --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Offorest-Mac
          path: |
            release/*.dmg
            release/*.zip
            release/*mac*.yml
          if-no-files-found: warn

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & Package (Windows)
        run: npm run build && npx electron-builder --win nsis --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Offorest-Windows
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
          if-no-files-found: warn
